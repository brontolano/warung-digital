services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: warung_digital
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      DB_HOST: postgres
    depends_on:
      - postgres

volumes:
  pgdata:
