version:'3.8'
services:
  postgres:
    image:postgres:16-alpine
    environment:[POSTGRES_DB:warung_digital,POSTGRES_USER:postgres,POSTGRES_PASSWORD:postgres]
    ports:['5432:5432']
    volumes:[pgdata:/var/lib/postgresql/data]
  backend:
    build:./backend
    ports:['3000:3000']
    env_file:.env
    depends_on:[postgres]
  waha:
    image:devlike/wa-ha:latest
    ports:['3001:3001']
  n8n:
    image:n8nio/n8n:latest
    ports:['5678:5678']
volumes:{pgdata:}