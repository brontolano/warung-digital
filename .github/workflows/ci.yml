name: CI — WarungDigital Backend

on:
  push:
    branches: [master, develop]
    paths: ['tier2-pro/backend/**']
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./tier2-pro/backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: warung_digital_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./tier2-pro/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Run tests
        run: npm test || true
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: warung_digital_test
          DB_USER: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: test-secret
