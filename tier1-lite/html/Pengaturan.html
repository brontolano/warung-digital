<!DOCTYPE html><html><head><base target="_top"><meta name="viewport" content="width=device-width,initial-scale=1.0"><script src="https://cdn.tailwindcss.com"></script><title>WarungDigital — Pengaturan</title></head>

<button onclick="nav('pengaturan')" class="flex flex-col items-center text-green-600"><span class="text-2xl">⚙️</span></button>
</div></div>
<script>
var user = JSON.parse(localStorage.getItem('user')||'{}');
function nav(p){window.location.href='?page='+p+'&token='+token}
